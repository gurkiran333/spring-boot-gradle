version: "3.8"

services:
  postgresdb-service:
    image: postgres:15
    container_name: postgres-container  
    environment:
      POSTGRES_USER: pgres
      POSTGRES_PASSWORD: pgres
      POSTGRES_DB: pgres_db
    ports:
      - "5432:5432"
    volumes: 
      - postgres_data:/var/lib/postgresql/data
    restart: always

  sonarqube-service:
    image: sonarqube:latest
    container_name: sonarqube-container
    ports:
      - "9000:9000"
    environment:
      SONARQUBE_JDBC_URL: jdbc:postgresql://postgresdb-service:5432/pgres_db
      SONARQUBE_JDBC_USERNAME: pgres
      SONARQUBE_JDBC_PASSWORD: pgres
    depends_on:
      - postgresdb-service
    restart: always

volumes:
  postgres_data: