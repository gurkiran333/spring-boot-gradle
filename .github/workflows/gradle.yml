name: Java CI/CD Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  # =========================================================
  # 1. Gradle Build Job
  # =========================================================
  build:
    name: Gradle Build
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:

      # Checkout Source Code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Setup Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Build Application
      - name: Build with Gradle
        run: ./gradlew clean build


  # =========================================================
  # 2. SonarQube Analysis Job
  # =========================================================
  sonar-analysis:
    name: SonarQube Analysis
    runs-on: ubuntu-latest

    needs: build

    permissions:
      contents: read

    steps:

      # Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Setup Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Cache SonarQube Packages
      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # Cache Gradle Packages
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle

      # SonarQube Analysis
      - name: Build and Analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

        run: |
          ./gradlew clean build
          ./gradlew sonar --info


  # =========================================================
  # 3. Docker Build and Push Job
  # =========================================================
  docker-build-push:
    name: Docker Build and Push
    runs-on: ubuntu-latest

    needs:
      - build
      - sonar-analysis

    permissions:
      contents: read

    steps:

      # Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Setup Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Build JAR File
      - name: Build Application
        run: ./gradlew clean build

      # Login to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build and Push Docker Image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/spring-boot-gradle:latest
            ${{ secrets.DOCKER_USERNAME }}/spring-boot-gradle:${{ github.run_number }}


  # =========================================================
  # 4. Dependency Submission Job
  # =========================================================
  dependency-submission:
    name: Dependency Submission
    runs-on: ubuntu-latest

    needs:
      - build

    permissions:
      contents: write

    steps:

      # Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Submit Dependency Graph
      - name: Generate and Submit Dependency Graph
        uses: gradle/actions/dependency-submission@v4